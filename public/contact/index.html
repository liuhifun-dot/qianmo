<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="联系千墨 — 品牌设计与数字创意合作咨询。">
  <title>联系 — 千墨 QianMo</title>
  <link rel="stylesheet" href="../assets/css/qianmo.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="../index.html" class="logo">千墨<span class="logo-dot">.</span></a>
      <nav class="nav" id="nav">
        <button class="nav-toggle" id="navToggle" aria-label="菜单">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-list" id="navList">
          <li><a href="../index.html" class="nav-link">首页</a></li>
          <li><a href="../services/" class="nav-link">服务</a></li>
          <li><a href="../projects/" class="nav-link">案例</a></li>
          <li><a href="index.html" class="nav-link active">联系</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1 class="page-title">联系</h1>
        <p class="page-sub">期待与你合作</p>
      </div>
    </section>

    <section class="section">
      <div class="container contact-layout">
        <div class="contact-info">
          <h2>联系我们</h2>
          <p>无论你是需要一个 Logo、一套完整的品牌视觉体系，还是一个功能完善的官网，我们都可以帮到你。</p>

          <div class="contact-item">
            <h3>邮箱</h3>
            <p><a href="mailto:hello@qianmo.design">hello@qianmo.design</a></p>
          </div>

          <div class="contact-item">
            <h3>电话</h3>
            <p>+86 400-000-0000</p>
          </div>

          <div class="contact-item">
            <h3>地址</h3>
            <p>广东省中山市</p>
          </div>

          <div class="contact-item">
            <h3>社交媒体</h3>
            <div class="social-links">
              <a href="#" aria-label="微信">微信</a>
              <a href="#" aria-label="小红书">小红书</a>
              <a href="#" aria-label="Behance">Behance</a>
            </div>
          </div>
        </div>

        <form class="contact-form" id="contactForm">
          <h3>发送消息</h3>
          <div class="form-group">
            <label for="name">称呼</label>
            <input type="text" id="name" name="name" placeholder="你的名字 / 公司名称" required>
          </div>
          <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label for="service">感兴趣的服务</label>
            <select id="service" name="service">
              <option value="">请选择</option>
              <option value="branding">品牌策略</option>
              <option value="vis">视觉识别系统 (VIS)</option>
              <option value="digital">数字产品设计</option>
              <option value="web">网站开发</option>
              <option value="content">内容创意</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">项目简述</label>
            <textarea id="message" name="message" rows="4" placeholder="请描述你的项目需求、预算范围和时间预期" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">发送消息</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo">千墨<span class="logo-dot">.</span></span>
        <p>品牌设计与数字创意工作室</p>
      </div>
      <div class="footer-links">
        <a href="../services/">服务</a>
        <a href="../projects/">案例</a>
        <a href="index.html">联系</a>
      </div>
      <p class="footer-copy">&copy; 2026 千墨 QianMo. All rights reserved.</p>
    </div>
  </footer>

  <script src="../assets/js/qianmo.js"></script>
</body>
</html>
